name: Build

on:
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - "includes/**"
      - "CMakeLists.txt"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "src/**"
      - "includes/**"
      - "CMakeLists.txt"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B cmake-build-ci -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build cmake-build-ci -j

